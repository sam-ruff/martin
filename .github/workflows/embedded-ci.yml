name: Embedded CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-test:
    name: Build and test martin-embedded
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - uses: ./.github/actions/setup-rust
      - name: Build martin-embedded
        run: cargo build -p martin-embedded
      - name: Test martin-embedded
        run: cargo test -p martin-embedded
